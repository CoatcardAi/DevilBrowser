<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>AiMagic Options</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent: #8b5cf6;
        }

        body.light-mode {
            --bg: #f5f7ff;
            --card-bg: #ffffff;
            --text: #333333;
            --text-muted: #6c757d;
            --border: #e0e6ed;
            --primary: #4a6cf7;
        }

        body.dark-mode {
            --bg: #1e1e1e;
            --card-bg: #2c2c2c;
            --text: #f5f5f5;
            --text-muted: #94a3b8;
            --border: #444444;
            --primary: #60a5fa;
            --accent: #818cf8;
        }

        body.ocean-theme {
            --bg: #0d1b2a;
            --card-bg: #1b263b;
            --text: #e0f7fa;
            --text-muted: #80deea;
            --border: #415a77;
            --primary: #00b4d8;
            --accent: #26c6da;
        }

        body.contrast-theme {
            --bg: #000000;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --text-muted: #e0e0e0;
            --border: #ffffff;
            --primary: #bb86fc;
            --accent: #d0bcff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 24px;
            width: 400px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .header img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .account-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .info-label {
            color: var(--text-muted);
        }

        .info-value {
            font-weight: 600;
            color: var(--text);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-premium {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
        }

        .badge-free {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .sync-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .sync-btn:hover {
            background: var(--primary-hover);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-btn:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .btn-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            background: transparent;
            border: none;
            padding: 0;
            margin-bottom: 16px;
        }

        .btn-toggle button {
            padding: 10px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-family: inherit;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .btn-toggle button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
        }

        .status {
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #10b981;
            margin-top: 12px;
            height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .status.show {
            opacity: 1;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 24px;
        }

        .text-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .text-input:focus {
            border-color: var(--primary);
        }

        .login-status {
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            margin-top: 8px;
            min-height: 18px;
        }

        .login-status.success { color: #10b981; }
        .login-status.error   { color: #ef4444; }

        .badge-admin {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .badge-owner {
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            color: white;
            box-shadow: 0 2px 8px rgba(236, 72, 153, 0.3);
        }

        .stat-loading {
            color: var(--text-muted);
            font-style: italic;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="icon.png" alt="AiMagic Logo">
            <h1>AiMagic Settings</h1>
        </div>

        <div class="card">
            <div class="section-title">🎨 Appearance</div>
            <div class="input-group">
                <label>Theme Selection</label>
                <div class="btn-toggle" id="themeToggle">
                    <button data-theme="light">Light</button>
                    <button data-theme="dark">Dark</button>
                    <button data-theme="ocean">Ocean</button>
                    <button data-theme="contrast">Contrast</button>
                </div>
            </div>

            <div class="input-group" style="margin-top: 20px;">
                <label style="display: flex; justify-content: space-between;">
                    📏 UI Opacity <span id="uiOpacityVal">100%</span>
                </label>
                <input type="range" id="uiOpacity" min="10" max="100" value="100" style="width: 100%; accent-color: var(--primary);">
            </div>

            <div class="input-group" style="margin-top: 15px;">
                <label style="display: flex; justify-content: space-between;">
                    🔔 Toast Opacity <span id="toastOpacityVal">100%</span>
                </label>
                <input type="range" id="toastOpacity" min="10" max="100" value="100" style="width: 100%; accent-color: var(--primary);">
            </div>
        </div>

        <div class="card">
            <div class="section-title">⌨️ Auto Typer</div>
            <div class="input-group">
                <label style="display: flex; justify-content: space-between;">
                    🚀 Typing Speed <span id="typerWPMVal">60 WPM</span>
                </label>
                <input type="range" id="typerWPM" min="20" max="350" value="60" style="width: 100%; accent-color: var(--primary);">
                <div style="display:flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); margin-top: 4px;">
                    <span>Slow (20)</span>
                    <span>Fast (350)</span>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">👤 Account & Subscription</div>
            <div class="account-info">
                <div class="info-row">
                    <span class="info-label">Plan</span>
                    <span id="planStatus" class="badge badge-free">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Role</span>
                    <span id="userRole" class="info-value">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Email</span>
                    <span id="userEmail" class="info-value" style="font-size:12px; word-break:break-all;">Not Logged In</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Account Status</span>
                    <span id="accountStatus" class="info-value">—</span>
                </div>

                <!-- Stats section (visible only when logged in) -->
                <div id="statsSection" style="display:none; border-top: 1px solid var(--border); margin-top: 10px; padding-top: 10px; width:100%; flex-direction:column; gap:8px;">
                    <div class="info-row">
                        <span class="info-label">Today's Usage</span>
                        <span id="usageStatus" class="info-value">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Total Requests</span>
                        <span id="totalRequests" class="info-value">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Avg Response Time</span>
                        <span id="avgLatency" class="info-value">—</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Last Login</span>
                        <span id="lastLogin" class="info-value" style="font-size:11px;">—</span>
                    </div>
                </div>
                
                <!-- Login form (shown when not authenticated) -->
                <div id="loginSection" style="margin-top: 10px; display: flex; flex-direction: column; gap: 10px;">
                    <div id="loginForm">
                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" id="emailInput" class="text-input" placeholder="you@example.com">
                        </div>
                        <button class="sync-btn" id="sendOtpBtn" style="margin-top: 6px;">Send OTP</button>

                        <div id="otpSection" style="display: none; margin-top: 10px;">
                            <div class="input-group">
                                <label>OTP Code (6 digits)</label>
                                <input type="text" id="otpInput" class="text-input" placeholder="123456" maxlength="6" inputmode="numeric">
                            </div>
                            <button class="sync-btn" id="verifyOtpBtn" style="margin-top: 6px;">Verify &amp; Login</button>
                        </div>

                        <div id="loginStatus" class="login-status"></div>
                    </div>

                    <!-- Logout button (shown when authenticated) -->
                    <div id="logoutSection" style="display: none;">
                        <button class="login-btn" id="logoutBtn">Logout</button>
                    </div>
                </div>

                <button class="sync-btn" id="syncBtn">Sync Account</button>
            </div>
        </div>

        <div id="status" class="status">Account synced successfully!</div>

        <div class="footer">
            AiMagic v1.0.0 • Connected to Coatcard Portal
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
